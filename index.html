<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ぶいのめマインスイーパー</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">
    <h1>ぶいのめマインスイーパー</h1>

    <div class="top-status">
      <span id="message">マスをクリックして開始！</span>
      <button id="resetButton">リセット</button>
    </div>

    <div class="info">
      <div class="info-card">
        <span class="label">地雷</span>
        <span class="value mine-info">
          <span id="mineRemaining">0</span>
          <span class="slash">/</span>
          <span id="mineTotal">0</span>
        </span>
        <span class="sub-label">残り / 総数</span>
      </div>

      <div class="info-card">
        <span class="label">残りミス</span>
        <span id="lifeDisplay" class="value lives">💓💓💓</span>
      </div>
    </div>

    <div id="board" class="board" aria-label="マインスイーパー盤面"></div>

    <p class="hint">
      左クリック：開く / 右クリック：旗を立てる<br>
      3回目の地雷でゲームオーバーです。
    </p>
  </main>

  <script src="script.js"></script>
</body>
</html>
